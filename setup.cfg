[flake8]
max-line-length = 100
exclude = .git,__pycache__,.venv,node_modules,.jscpd-report
per-file-ignores =
    tests/*:S101

[pylint.main]
ignore = .git,__pycache__,.venv,node_modules

[pylint.messages_control]
disable = C0114,C0115,C0116

[tool:pytest]
testpaths = tests
addopts = --tb=short -q

[coverage:run]
omit =
    .venv/*
    tests/*
    setup.cfg

[coverage:report]
show_missing = true
