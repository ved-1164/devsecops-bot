name: DevSecOps Bot — PR Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write   # post comments
  contents: write        # commit auto-fixes back to branch

jobs:
  devsecops-scan:
    name: Security, Quality & CVE Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bot dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js (for jscpd)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install jscpd
        run: npm install -g jscpd

      - name: Run DevSecOps Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: python -m bot.main scan

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-report
          path: scan-report.json

      - name: Enforce security gate
        if: always()
        run: |
          python - << 'PYEOF'
          import json, sys
          try:
              with open("scan-report.json") as f:
                  report = json.load(f)
          except FileNotFoundError:
              print("scan-report.json not found — scan step may have failed")
              sys.exit(1)

          print(f"Warnings : {report['warnings']}")
          print(f"Failures : {report['failures']}")
          print(f"HIGH/CRIT: {report['high_severity_count']}")
          print(f"CVEs     : {report['cve_count']}")
          print(f"Coverage : {report.get('coverage_pct', 'N/A')}%")

          if report["blocked"]:
              print("\nSECURITY GATE: FAILED — fix HIGH severity issues before merging")
              sys.exit(1)
          else:
              print("\nSECURITY GATE: PASSED")
          PYEOF
